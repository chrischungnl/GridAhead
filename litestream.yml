# Litestream configuration for SQLite replication.
#
# On your Mac (source): litestream replicate -config litestream.yml
# On Fly.io (restore):  litestream restore -config litestream.yml /data/predictions.db
#
# Set LITESTREAM_REPLICA_URL to your Cloudflare R2 bucket URL:
#   s3://bucket-name/predictions.db
#
# Required environment variables:
#   LITESTREAM_ACCESS_KEY_ID     — R2 access key
#   LITESTREAM_SECRET_ACCESS_KEY — R2 secret key

dbs:
  - path: /data/predictions.db
    replicas:
      - type: s3
        bucket: ${LITESTREAM_BUCKET:-gridahead}
        path: predictions.db
        endpoint: ${LITESTREAM_ENDPOINT:-https://your-account-id.r2.cloudflarestorage.com}
        access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
        secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
